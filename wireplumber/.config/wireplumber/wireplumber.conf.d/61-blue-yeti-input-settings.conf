monitor.alsa.rules = [
    {
        matches = [
            {
                node.name = "alsa_input.usb-C-Media_Electronics_Inc._USB_Advanced_Audio_Device-00.pro-input-0"
            }
        ]
        actions = {
            update-props = {
                audio.channels = 2
                audio.format = "S16LE"
                audio.allowed-rates = [ 48000 ]
                audio.rate = 48000
                api.alsa.period-size = 1024
                api.alsa.period-num = 2
                node.pause-on-idle = false
            }
        }
    }
]
