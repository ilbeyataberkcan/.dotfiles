monitor.alsa.rules = [
    {
        matches = [
            {
                node.name = "alsa_output.usb-C-Media_Electronics_Inc._USB_Advanced_Audio_Device-00.pro-output-0"
            }
        ]
        actions = {
            update-props = {
                node.disabled = true # I don't use the microphone jack on the Blue yeti for audio output. Therefore, no need for clutter in my pavucontrol or carla UI.
            }
        }
    }
]
