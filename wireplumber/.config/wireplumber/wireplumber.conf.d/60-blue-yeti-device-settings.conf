monitor.alsa.rules = [
    {
        matches = [
            {
                device.name = "alsa_card.usb-C-Media_Electronics_Inc._USB_Advanced_Audio_Device-00"
            }
        ]
        actions = {
            update-props = {
                api.alsa.use-acp = false # Well we are in the Pro World Now...
                api.alsa.soft-mixer = true
                api.alsa.use-ucm = true
                device.profile = "pro-audio"
                device.nick = "Blue Yeti Black Edition"
                device.disabled = false
            }

        }
    }
]
